name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Placeholder values: the build validates env presence and constructs the
      # DB adapter lazily, so no live database is needed for lint/typecheck/test/build.
      DATABASE_URL: "mysql://ci:ci@127.0.0.1:3306/subsify"
      NEXTAUTH_SECRET: "ci-placeholder-secret-at-least-32-characters"
      NEXTAUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
