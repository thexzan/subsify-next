services:
  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: subsify
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://root:root@db:3306/subsify"
      NEXTAUTH_SECRET: "change-me-in-production-use-openssl-rand-base64-32"
      NEXTAUTH_URL: "http://localhost:3000"
      # Seed sample data on first boot. Set to false after the first run
      # so restarts don't reset your data.
      RUN_SEED: "true"
    ports:
      - "3000:3000"

volumes:
  db_data:
